<script>
  const ALLOWED_CATEGORIES = [
    "Accessories- Samsung",
    "Accessories- Apple",
    "Accessories - Samsung Cases"
  ];

  let allItems = [], inventoryMap = {}, loaded = false;

  function getQty(variantId) {
    return inventoryMap[variantId] !== undefined ? inventoryMap[variantId] : 999;
  }

  function getItemQty(item) {
    return (item.variants || []).reduce((sum, v) => sum + getQty(v.variant_id), 0);
  }

  function getImage(item) {
    if (item.images && Array.isArray(item.images) && item.images.length > 0) {
      const img = item.images[0];
      if (typeof img === 'string') return img;
      if (img.image_url) return img.image_url;
      if (img.url) return img.url;
      if (img.src) return img.src;
    }
    if (item.image_url) return item.image_url;
    if (item.image) return item.image;
    return null;
  }

  function cardImageHtml(item) {
    if (item.image) {
      return '<div class="card-img-wrap"><img class="card-img" src="' + esc(item.image) + '" alt="' + esc(item.name) + '" onerror="this.parentNode.innerHTML=\'<div class=card-img-placeholder>📱</div>\'"></div>';
    }
    return '<div class="card-img-wrap"><div class="card-img-placeholder">📱</div></div>';
  }

  function whatsappBtn(itemName) {
    const msg = encodeURIComponent("Hi! I'd like to order: " + itemName);
    return '<a class="wa-btn" href="https://wa.me/18764905515?text=' + msg + '" target="_blank"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Order via WhatsApp</a>';
  }

  const CTA = '<div class="card-cta">Don\'t see what you\'re looking for? Call or WhatsApp us at (876) 490-5515 to be sure</div>';

  function buildCard(item, filteredVariants) {
    const imgHtml = cardImageHtml(item);
    const displayVariants = filteredVariants || (item.variants || []).filter(v => getQty(v.variant_id) > 0);
    const hasVariants = displayVariants.length > 0 && item.variants && item.variants.length > 1;
    const totalQty = filteredVariants
      ? filteredVariants.reduce((sum, v) => sum + getQty(v.variant_id), 0)
      : getItemQty(item);

    if (totalQty <= 0) {
      return '<div class="card">' +
        '<div class="card-body">' +
          '<div><div class="card-top"><div class="card-name">' + esc(item.name) + '</div><span class="badge out">Out of stock</span></div>' +
          '<div class="card-meta">' + (item.category ? '<span class="meta-tag">' + esc(item.category) + '</span>' : '') + (item.sku ? '<span class="meta-tag">SKU: ' + esc(item.sku) + '</span>' : '') + '</div></div>' +
          '<div class="card-actions">' + CTA + '</div>' +
        '</div>' + imgHtml + '</div>';
    }

    if (hasVariants) {
      const varRows = displayVariants.map(v =>
        '<div class="variant-row"><span class="variant-name">' + esc(v.option1_value || v.option2_value || 'Variant') + '</span><span class="badge in">In stock</span></div>'
      ).join('');
      return '<div class="card">' +
        '<div class="card-body">' +
          '<div><div class="card-top"><div class="card-name">' + esc(item.name) + '</div><span class="badge in">In stock</span></div>' +
          '<div class="card-meta">' + (item.category ? '<span class="meta-tag">' + esc(item.category) + '</span>' : '') + (item.sku ? '<span class="meta-tag">SKU: ' + esc(item.sku) + '</span>' : '') + '</div>' +
          '<div class="variants">' + varRows + '</div></div>' +
          '<div class="card-actions">' + whatsappBtn(item.name) + CTA + '</div>' +
        '</div>' + imgHtml + '</div>';
    }

    return '<div class="card">' +
      '<div class="card-body">' +
        '<div><div class="card-top"><div class="card-name">' + esc(item.name) + '</div><span class="badge in">In stock</span></div>' +
        '<div class="card-meta">' + (item.category ? '<span class="meta-tag">' + esc(item.category) + '</span>' : '') + (item.sku ? '<span class="meta-tag">SKU: ' + esc(item.sku) + '</span>' : '') + '</div></div>' +
        '<div class="card-actions">' + whatsappBtn(item.name) + CTA + '</div>' +
      '</div>' + imgHtml + '</div>';
  }

  function onCatChange() {
    document.getElementById('search').value = '';
    showPrompt();
  }

  function showPrompt() {
    document.getElementById('grid').innerHTML = '<div class="prompt-state"><div class="prompt-phone"><div class="prompt-phone-icon">🔍</div></div><strong>Type to search</strong><p>Enter an item name or style number above</p></div>';
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const cat = document.getElementById('cat-filter').value;
    const grid = document.getElementById('grid');
    if (!loaded) return;
    if (!q) { showPrompt(); return; }

    const filtered = allItems.map(item => {
      const matchC = !cat || item.category === cat;
      if (!matchC) return null;

      const matchingVariants = (item.variants || []).filter(v => {
        const v1 = (v.option1_value || '').toLowerCase().trim();
        const v2 = (v.option2_value || '').toLowerCase().trim();
        return v1.includes(q) || v2.includes(q);
      });

      const nameOrSkuMatch = item.name.toLowerCase().includes(q) || (item.sku || '').toLowerCase().includes(q);

      if (matchingVariants.length > 0) {
        const inStockMatches = matchingVariants.filter(v => getQty(v.variant_id) > 0);
        if (inStockMatches.length === 0) return null;
        return { ...item, _filteredVariants: inStockMatches };
      }

      if (nameOrSkuMatch) {
        return { ...item, _filteredVariants: null };
      }

      return null;
    }).filter(Boolean);

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">No items found. <span style="color:var(--cyan)">Call or WhatsApp us at (876) 490-5515</span> to confirm availability.</div>';
      return;
    }

    grid.innerHTML = filtered.map(item => buildCard(item, item._filteredVariants)).join('');
  }

  function populateCats() {
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))].sort();
    const sel = document.getElementById('cat-filter');
    sel.innerHTML = '<option value="">All categories</option>' + cats.map(c => '<option value="' + esc(c) + '">' + esc(c) + '</option>').join('');
  }

  async function fetchAll() {
    document.getElementById('grid').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading inventory&hellip;</p></div>';
    document.getElementById('error-area').innerHTML = '';
    try {
      const [itemsRes, storesRes, catsRes] = await Promise.all([
        fetch('/api/loyverse?path=items'),
        fetch('/api/loyverse?path=stores'),
        fetch('/api/loyverse?path=categories')
      ]);
      if (!itemsRes.ok) throw new Error('API error ' + itemsRes.status + '. Check LOYVERSE_TOKEN in Vercel.');
      const itemsData = await itemsRes.json();
      const storesData = storesRes.ok ? await storesRes.json() : null;
      const catsData = catsRes.ok ? await catsRes.json() : { categories: [] };
      const catMap = {};
      (catsData.categories || []).forEach(c => { catMap[c.id] = c.name; });
      const storeId = storesData && storesData.stores && storesData.stores[0] ? storesData.stores[0].id : '';
      const invRes = await fetch('/api/loyverse?path=inventory' + (storeId ? '&store_id=' + storeId : ''));
      const invData = invRes.ok ? await invRes.json() : { inventory_levels: [] };
      inventoryMap = {};
      (invData.inventory_levels || []).forEach(l => {
        inventoryMap[l.variant_id] = (l.in_stock === null || l.in_stock === undefined) ? 999 : l.in_stock;
      });
      allItems = (itemsData.items || [])
        .map(item => {
          const catName = catMap[item.category_id] || item.category_name || '';
          return {
            id: item.id,
            name: item.item_name,
            category: catName,
            sku: (item.variants && item.variants[0] && item.variants[0].sku) || '',
            image: getImage(item),
            variants: item.variants || []
          };
        })
        .filter(item => ALLOWED_CATEGORIES.some(c => c.toLowerCase() === item.category.toLowerCase()));
      loaded = true;
      populateCats();
      showPrompt();
      document.getElementById('last-sync').textContent = 'Last synced: ' + new Date().toLocaleTimeString();
    } catch(err) {
      document.getElementById('error-area').innerHTML = '<div class="error-box">&#9888; ' + err.message + '</div>';
      document.getElementById('grid').innerHTML = '<div class="empty-state">Could not connect. See error above.</div>';
    }
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  fetchAll();
  setInterval(fetchAll, 300000);
</script>
