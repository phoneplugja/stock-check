<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Phone Plug — Stock Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --cyan: #29b5e8;
    --cyan-dark: #1a8fc0;
    --cyan-light: #e3f6fd;
    --white: #ffffff;
    --gray-1: #f4f5f7;
    --gray-2: #e8eaed;
    --gray-3: #9aa0a6;
    --gray-4: #5f6368;
    --green: #0f7b3d;
    --green-light: #e6f4ec;
    --amber: #7a4f00;
    --amber-light: #fef3e2;
    --red: #c5221f;
    --red-light: #fce8e6;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--gray-1); color: var(--black); min-height: 100vh; }
  header { background: var(--black); padding: 0 2rem; height: 68px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--cyan); }
  .logo img { height: 44px; width: auto; object-fit: contain; }
  .header-right { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: rgba(255,255,255,0.45); }
  .live-dot { width: 7px; height: 7px; background: var(--cyan); border-radius: 50%; animation: blink 2s infinite; box-shadow: 0 0 6px var(--cyan); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero { background: var(--black); padding: 2.25rem 2rem 2.75rem; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
  .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.85rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; margin-bottom: 8px; }
  .hero h1 span { color: var(--cyan); }
  .hero p { font-size: 0.875rem; color: rgba(255,255,255,0.4); }
  main { max-width: 960px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--white); border-radius: var(--radius); padding: 1rem 1.25rem; border: 1px solid var(--gray-2); border-top: 3px solid var(--gray-2); }
  .stat.cyan-top { border-top-color: var(--cyan); }
  .stat.green-top { border-top-color: var(--green); }
  .stat.red-top { border-top-color: var(--red); }
  .stat-n { font-family: 'Space Grotesk', sans-serif; font-size: 1.85rem; font-weight: 700; line-height: 1; margin-bottom: 4px; color: var(--black); }
  .stat-n.cyan { color: var(--cyan-dark); }
  .stat-n.green { color: var(--green); }
  .stat-n.red { color: var(--red); }
  .stat-l { font-size: 0.72rem; color: var(--gray-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
  .search-row { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius); padding: 11px 14px 11px 38px; font-family: 'Inter',sans-serif; font-size: 0.875rem; color: var(--black); outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(41,181,232,0.12); }
  .search-wrap input::placeholder { color: var(--gray-3); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-3); }
  select { background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius); padding: 11px 14px; font-family: 'Inter',sans-serif; font-size: 0.875rem; color: var(--black); outline: none; cursor: pointer; transition: border-color 0.15s; }
  select:focus { border-color: var(--cyan); }
  .refresh-btn { display: flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius); padding: 11px 14px; font-family: 'Inter',sans-serif; font-size: 0.875rem; cursor: pointer; color: var(--gray-4); transition: all 0.15s; white-space: nowrap; }
  .refresh-btn:hover { border-color: var(--cyan); color: var(--cyan-dark); }
  .pills { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .pill { padding: 6px 16px; border-radius: 99px; border: 1px solid var(--gray-2); background: var(--white); font-size: 0.8rem; cursor: pointer; color: var(--gray-4); font-family: 'Inter',sans-serif; transition: all 0.15s; font-weight: 500; }
  .pill:hover { border-color: var(--cyan); color: var(--cyan-dark); }
  .pill.active { background: var(--cyan); color: var(--white); border-color: var(--cyan); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 12px; }
  .
