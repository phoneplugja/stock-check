<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Phone Plug — Stock Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0d0d0d;
    --cyan: #29b5e8;
    --cyan-dark: #1a8fc0;
    --cyan-light: #e3f6fd;
    --white: #ffffff;
    --gray-1: #f4f5f7;
    --gray-2: #e8eaed;
    --gray-3: #9aa0a6;
    --gray-4: #5f6368;
    --green: #0f7b3d;
    --green-light: #e6f4ec;
    --amber: #7a4f00;
    --amber-light: #fef3e2;
    --red: #c5221f;
    --red-light: #fce8e6;
    --radius: 10px;
    --radius-lg: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--gray-1); color: var(--black); min-height: 100vh; }
  header { background: var(--black); padding: 0 2rem; height: 68px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--cyan); }
  .logo img { height: 44px; width: auto; object-fit: contain; }
  .header-right { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: rgba(255,255,255,0.45); }
  .live-dot { width: 7px; height: 7px; background: var(--cyan); border-radius: 50%; animation: blink 2s infinite; box-shadow: 0 0 6px var(--cyan); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero { background: var(--black); padding: 2.25rem 2rem 2.75rem; border-bottom: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
  .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.85rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; margin-bottom: 8px; }
  .hero h1 span { color: var(--cyan); }
  .hero p { font-size: 0.875rem; color: rgba(255,255,255,0.4); }
  main { max-width: 960px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--white); border-radius: var(--radius); padding: 1rem 1.25rem; border: 1px solid var(--gray-2); border-top: 3px solid var(--gray-2); }
  .stat.cyan-top { border-top-color: var(--cyan); }
  .stat.green-top { border-top-color: var(--green); }
  .stat.red-top { border-top-color: var(--red); }
  .stat-n { font-family: 'Space Grotesk', sans-serif; font-size: 1.85rem; font-weight: 700; line-height: 1; margin-bottom: 4px; color: var(--black); }
  .stat-n.cyan { color: var(--cyan-dark); }
  .stat-n.green { color: var(--green); }
  .stat-n.red { color: var(--red); }
  .stat-l { font-size: 0.72rem; color: var(--gray-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
  .search-row { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input { width: 100%; background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius); padding: 11px 14px 11px 38px; font-family: 'Inter',sans-serif; font-size: 0.875rem; color: var(--black); outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(41,181,232,0.12); }
  .search-wrap input::placeholder { color: var(--gray-3); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-3); }
  select { background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius); padding: 11px 14px; font-family: 'Inter',sans-serif; font-size: 0.875rem; color: var(--black); outline: none; cursor: pointer; transition: border-color 0.15s; }
  select:focus { border-color: var(--cyan); }
  .refresh-btn { display: flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--gray-2); border-radius: var(--radius); padding: 11px 14px; font-family: 'Inter',sans-serif; font-size: 0.875rem; cursor: pointer; color: var(--gray-4); transition: all 0.15s; white-space: nowrap; }
  .refresh-btn:hover { border-color: var(--cyan); color: var(--cyan-dark); }
  .pills { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .pill { padding: 6px 16px; border-radius: 99px; border: 1px solid var(--gray-2); background: var(--white); font-size: 0.8rem; cursor: pointer; color: var(--gray-4); font-family: 'Inter',sans-serif; transition: all 0.15s; font-weight: 500; }
  .pill:hover { border-color: var(--cyan); color: var(--cyan-dark); }
  .pill.active { background: var(--cyan); color: var(--white); border-color: var(--cyan); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 12px; }
  .card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-2); padding: 1.25rem; transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s; }
  .card:hover { box-shadow: 0 6px 24px rgba(41,181,232,0.1); transform: translateY(-2px); border-color: rgba(41,181,232,0.3); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .card-name { font-size: 0.9rem; font-weight: 500; line-height: 1.4; flex: 1; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em; }
  .badge::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; display:inline-block; }
  .badge.in { background: var(--green-light); color: var(--green); }
  .badge.low { background: var(--amber-light); color: var(--amber); }
  .badge.out { background: var(--red-light); color: var(--red); }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .meta-tag { font-size: 0.7rem; color: var(--gray-3); background: var(--gray-1); padding: 2px 8px; border-radius: 6px; }
  .variants { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gray-2); display: flex; flex-direction: column; gap: 7px; }
  .variant-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; }
  .variant-name { color: var(--gray-4); }
  .loading-state { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 5rem 1rem; color: var(--gray-3); font-size: 0.875rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--gray-2); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--gray-3); font-size: 0.875rem; }
  .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
  .error-box { background: var(--red-light); border: 1px solid rgba(197,34,31,0.15); border-radius: var(--radius); padding: 0.875rem 1.25rem; color: var(--red); font-size: 0.825rem; margin-bottom: 1.25rem; }
  .last-sync { text-align: right; font-size: 0.72rem; color: var(--gray-3); margin-top: 1.5rem; }
  footer { background: var(--black); text-align: center; padding: 1.5rem; font-size: 0.75rem; color: rgba(255,255,255,0.2); margin-top: 4rem; border-top: 1px solid rgba(255,255,255,0.06); }
  footer span { color: var(--cyan); opacity: 0.7; }
  @media (max-width:520px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .stat:last-child { grid-column: 1/-1; }
    .hero { padding: 1.5rem 1.25rem 2rem; }
    .hero h1 { font-size: 1.4rem; }
    header { padding: 0 1.25rem; }
    .logo img { height: 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="The Phone Plug">
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    Live stock
  </div>
</header>

<div class="hero">
  <h1>Check What's <span>in Stock</span></h1>
  <p>Search our accessories — updated live from our store</p>
</div>

<main>
  <div id="error-area"></div>
  <div class="stats">
    <div class="stat cyan-top"><div class="stat-n cyan" id="s-total">—</div><div class="stat-l">Total items</div></div>
    <div class="stat green-top"><div class="stat-n green" id="s-in">—</div><div class="stat-l">In stock</div></div>
    <div class="stat red-top"><div class="stat-n red" id="s-out">—</div><div class="stat-l">Low / Out</div></div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search by name or SKU…" oninput="render()">
    </div>
    <select id="cat-filter" onchange="render()"><option value="">All categories</option></select>
    <button class="refresh-btn" onclick="fetchAll()">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Refresh
    </button>
  </div>
  <div class="pills">
    <button class="pill active" onclick="setStatus(this,'')">All</button>
    <button class="pill" onclick="setStatus(this,'in')">In stock</button>
    <button class="pill" onclick="setStatus(this,'low')">Low stock</button>
    <button class="pill" onclick="setStatus(this,'out')">Out of stock</button>
  </div>
  <div class="grid" id="grid">
    <div class="loading-state"><div class="spinner"></div><p>Loading inventory…</p></div>
  </div>
  <div class="last-sync" id="last-sync"></div>
</main>

<footer>&copy; 2026 <span>The Phone Plug</span> &nbsp;&middot;&nbsp; Stock updates automatically</footer>

<script>
  const ALLOWED_CATEGORIES = [
    "Accessories- Samsung",
    "Accessories- Apple",
    "Accessories - Samsung Cases"
  ];

  let allItems = [], inventoryMap = {}, statusFilter = '';

  function getStatus(qty) { return qty <= 0 ? 'out' : qty <= 5 ? 'low' : 'in'; }
  function statusLabel(qty) { return qty <= 0 ? 'Out of stock' : qty <= 5 ? 'Low \u00b7 ' + qty + ' left' : 'In stock \u00b7 ' + qty; }

  function setStatus(el, val) {
    statusFilter = val;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const cat = document.getElementById('cat-filter').value;
    const grid = document.getElementById('grid');
    let filtered = allItems.filter(item => {
      const matchQ = !q || item.name.toLowerCase().includes(q) || (item.sku||'').toLowerCase().includes(q);
      const matchC = !cat || item.category === cat;
      return matchQ && matchC;
    });
    if (statusFilter) {
      filtered = filtered.filter(item => {
        if (item.variants && item.variants.length > 1)
          return item.variants.some(v => getStatus(inventoryMap[v.variant_id] || 0) === statusFilter);
        return getStatus(inventoryMap[item.variants && item.variants[0] && item.variants[0].variant_id] || 0) === statusFilter;
      });
    }
    if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><span class="empty-icon">&#128269;</span><p>No items match your search.</p></div>'; return; }
    grid.innerHTML = filtered.map(item => {
      const hasVariants = item.variants && item.variants.length > 1;
      if (hasVariants) {
        const varRows = item.variants.map(v => {
          const qty = inventoryMap[v.variant_id] || 0;
          return '<div class="variant-row"><span class="variant-name">' + esc(v.option1_value || v.option2_value || 'Variant') + '</span><span class="badge ' + getStatus(qty) + '">' + statusLabel(qty) + '</span></div>';
        }).join('');
        const anyIn = item.variants.some(v => (inventoryMap[v.variant_id] || 0) > 5);
        const anyLow = item.variants.some(v => { const q = inventoryMap[v.variant_id] || 0; return q > 0 && q <= 5; });
        const st = anyIn ? 'in' : anyLow ? 'low' : 'out';
        const label = anyIn ? 'In stock' : anyLow ? 'Low stock' : 'Out of stock';
        return '<div class="card"><div class="card-top"><div class="card-name">' + esc(item.name) + '</div><span class="badge ' + st + '">' + label + '</span></div><div class="card-meta">' + (item.category ? '<span class="meta-tag">' + esc(item.category) + '</span>' : '') + (item.sku ? '<span class="meta-tag">SKU: ' + esc(item.sku) + '</span>' : '') + '</div><div class="variants">' + varRows + '</div></div>';
      }
      const varId = item.variants && item.variants[0] && item.variants[0].variant_id;
      const qty = inventoryMap[varId] || 0;
      const st = getStatus(qty);
      return '<div class="card"><div class="card-top"><div class="card-name">' + esc(item.name) + '</div><span class="badge ' + st + '">' + statusLabel(qty) + '</span></div><div class="card-meta">' + (item.category ? '<span class="meta-tag">' + esc(item.category) + '</span>' : '') + (item.sku ? '<span class="meta-tag">SKU: ' + esc(item.sku) + '</span>' : '') + '</div></div>';
    }).join('');
  }

  function updateStats() {
    const total = allItems.length;
    const inStock = allItems.filter(item => (item.variants||[]).some(v => (inventoryMap[v.variant_id]||0) > 5)).length;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-in').textContent = inStock;
    document.getElementById('s-out').textContent = total - inStock;
  }

  function populateCats() {
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))].sort();
    const sel = document.getElementById('cat-filter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All categories</option>' + cats.map(c => '<option value="' + esc(c) + '"' + (c===cur?' selected':'') + '>' + esc(c) + '</option>').join('');
  }

  async function fetchAll() {
    document.getElementById('grid').innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading inventory&hellip;</p></div>';
    document.getElementById('error-area').innerHTML = '';
    try {
      const [itemsRes, storesRes] = await Promise.all([
        fetch('/.netlify/functions/loyverse?path=items'),
        fetch('/.netlify/functions/loyverse?path=stores')
      ]);
      if (!itemsRes.ok) throw new Error('API error ' + itemsRes.status + '. Check LOYVERSE_TOKEN in Netlify.');
      const itemsData = await itemsRes.json();
      const storesData = storesRes.ok ? await storesRes.json() : null;
      const storeId = storesData && storesData.stores && storesData.stores[0] ? storesData.stores[0].id : '';
      const invRes = await fetch('/.netlify/functions/loyverse?path=inventory' + (storeId ? '&store_id=' + storeId : ''));
      const invData = invRes.ok ? await invRes.json() : { inventory_levels: [] };
      inventoryMap = {};
      (invData.inventory_levels || []).forEach(l => { inventoryMap[l.variant_id] = l.in_stock || 0; });
      allItems = (itemsData.items || [])
        .filter(item => ALLOWED_CATEGORIES.some(c => c.toLowerCase() === (item.category_name||'').toLowerCase()))
        .map(item => ({ id: item.id, name: item.item_name, category: item.category_name||'', sku: (item.variants&&item.variants[0]&&item.variants[0].sku)||'', variants: item.variants||[] }));
      populateCats();
      updateStats();
      render();
      document.getElementById('last-sync').textContent = 'Last synced: ' + new Date().toLocaleTimeString();
    } catch(err) {
      document.getElementById('error-area').innerHTML = '<div class="error-box">&#9888; ' + err.message + '</div>';
      document.getElementById('grid').innerHTML = '<div class="empty-state"><span class="empty-icon">&#9888;</span><p>Could not connect. See error above.</p></div>';
    }
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  fetchAll();
  setInterval(fetchAll, 300000);
</script>
</body>
</html>
