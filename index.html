<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Checker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --ink: #1a1815;
    --ink-2: #6b6660;
    --ink-3: #a8a49f;
    --accent: #2d4a3e;
    --accent-light: #e8f0ed;
    --warn: #7a4010;
    --warn-light: #fdf0e6;
    --red: #8b1a1a;
    --red-light: #fdf0f0;
    --border: rgba(26,24,21,0.1);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: #fff;
    letter-spacing: -0.01em;
  }

  .brand span {
    font-style: italic;
    opacity: 0.7;
    font-size: 0.9rem;
    display: block;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0;
    margin-top: 1px;
  }

  .sync-info {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .stat {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
  }

  .stat-n {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-l {
    font-size: 0.75rem;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-n.green { color: var(--accent); }
  .stat-n.amber { color: var(--warn); }
  .stat-n.red { color: var(--red); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px 10px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-wrap svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .ftab {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink-2);
    font-family: 'DM Sans', sans-serif;
  }

  .ftab:hover { border-color: var(--accent); color: var(--accent); }
  .ftab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.07);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-name {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.35;
    flex: 1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge.in { background: var(--accent-light); color: var(--accent); }
  .badge.low { background: var(--warn-light); color: var(--warn); }
  .badge.out { background: var(--red-light); color: var(--red); }

  .badge::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 0.73rem;
    color: var(--ink-3);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 6px;
  }

  .variants {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .variant-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
  }

  .variant-name { color: var(--ink-2); }

  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--ink-3);
  }

  .empty-state .big { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.9rem; }

  .loading-state {
    grid-column: 1/-1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 4rem 1rem;
    color: var(--ink-3);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: var(--red-light);
    border: 1px solid rgba(139,26,26,0.15);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    color: var(--red);
    font-size: 0.875rem;
    margin-bottom: 1rem;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    cursor: pointer;
    color: var(--ink-2);
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn svg { transition: transform 0.3s; }
  .refresh-btn:hover svg { transform: rotate(180deg); }

  .last-updated {
    font-size: 0.75rem;
    color: var(--ink-3);
    text-align: right;
    margin-top: 1.5rem;
  }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: 1fr 1fr; }
    .stat:last-child { grid-column: 1/-1; }
    header { padding: 1.25rem; }
    .brand { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    Stock Checker
    <span id="store-name">Live inventory</span>
  </div>
  <div class="sync-info">
    <div class="sync-dot"></div>
    Synced with Loyverse
  </div>
</header>

<main>
  <div id="error-area"></div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total items</div></div>
    <div class="stat"><div class="stat-n green" id="s-in">—</div><div class="stat-l">In stock</div></div>
    <div class="stat"><div class="stat-n red" id="s-out">—</div><div class="stat-l">Low / Out</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search items…" oninput="render()">
    </div>
    <select id="cat-filter" onchange="render()">
      <option value="">All categories</option>
    </select>
    <button class="refresh-btn" onclick="fetchAll()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Refresh
    </button>
  </div>

  <div class="filter-tabs" id="status-tabs">
    <button class="ftab active" data-status="" onclick="setStatus(this, '')">All</button>
    <button class="ftab" data-status="in" onclick="setStatus(this, 'in')">In stock</button>
    <button class="ftab" data-status="low" onclick="setStatus(this, 'low')">Low stock</button>
    <button class="ftab" data-status="out" onclick="setStatus(this, 'out')">Out of stock</button>
  </div>

  <div class="grid" id="grid">
    <div class="loading-state"><div class="spinner"></div><p>Loading inventory…</p></div>
  </div>

  <div class="last-updated" id="last-updated"></div>
</main>

<script>
  let allItems = [];
  let inventoryMap = {};
  let statusFilter = '';

  function getStatus(qty) {
    if (qty <= 0) return 'out';
    if (qty <= 5) return 'low';
    return 'in';
  }

  function statusLabel(qty) {
    if (qty <= 0) return 'Out of stock';
    if (qty <= 5) return `Low · ${qty} left`;
    return `In stock · ${qty}`;
  }

  function setStatus(el, val) {
    statusFilter = val;
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const cat = document.getElementById('cat-filter').value;
    const grid = document.getElementById('grid');

    let filtered = allItems.filter(item => {
      const nameMatch = !q || item.name.toLowerCase().includes(q) || (item.sku||'').toLowerCase().includes(q);
      const catMatch = !cat || item.category === cat;
      return nameMatch && catMatch;
    });

    if (statusFilter) {
      filtered = filtered.filter(item => {
        if (item.variants && item.variants.length > 1) {
          return item.variants.some(v => getStatus(inventoryMap[v.variant_id] ?? 0) === statusFilter);
        }
        const qty = inventoryMap[item.variants?.[0]?.variant_id] ?? 0;
        return getStatus(qty) === statusFilter;
      });
    }

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state"><div class="big">🔍</div><p>No items match your search.</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(item => {
      const hasVariants = item.variants && item.variants.length > 1;

      if (hasVariants) {
        const variantRows = item.variants.map(v => {
          const qty = inventoryMap[v.variant_id] ?? 0;
          const st = getStatus(qty);
          return `<div class="variant-row">
            <span class="variant-name">${esc(v.option1_value || v.option2_value || 'Variant')}</span>
            <span class="badge ${st}">${statusLabel(qty)}</span>
          </div>`;
        }).join('');

        const anyIn = item.variants.some(v => (inventoryMap[v.variant_id] ?? 0) > 5);
        const anyLow = item.variants.some(v => { const q = inventoryMap[v.variant_id] ?? 0; return q > 0 && q <= 5; });
        const st = anyIn ? 'in' : anyLow ? 'low' : 'out';
        const label = anyIn ? 'In stock' : anyLow ? 'Low stock' : 'Out of stock';

        return `<div class="card">
          <div class="card-top">
            <div class="card-name">${esc(item.name)}</div>
            <span class="badge ${st}">${label}</span>
          </div>
          <div class="card-meta">
            ${item.category ? `<span class="meta-tag">${esc(item.category)}</span>` : ''}
            ${item.sku ? `<span class="meta-tag">SKU: ${esc(item.sku)}</span>` : ''}
          </div>
          <div class="variants">${variantRows}</div>
        </div>`;
      }

      const varId = item.variants?.[0]?.variant_id;
      const qty = inventoryMap[varId] ?? 0;
      const st = getStatus(qty);

      return `<div class="card">
        <div class="card-top">
          <div class="card-name">${esc(item.name)}</div>
          <span class="badge ${st}">${statusLabel(qty)}</span>
        </div>
        <div class="card-meta">
          ${item.category ? `<span class="meta-tag">${esc(item.category)}</span>` : ''}
          ${item.sku ? `<span class="meta-tag">SKU: ${esc(item.sku)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function updateStats() {
    const total = allItems.length;
    const inStock = allItems.filter(item => {
      const vids = item.variants?.map(v => v.variant_id) || [];
      return vids.some(id => (inventoryMap[id] ?? 0) > 5);
    }).length;
    const lowOut = allItems.filter(item => {
      const vids = item.variants?.map(v => v.variant_id) || [];
      return vids.every(id => (inventoryMap[id] ?? 0) <= 5);
    }).length;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-in').textContent = inStock;
    document.getElementById('s-out').textContent = lowOut;
  }

  function populateCats() {
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))].sort();
    const sel = document.getElementById('cat-filter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option value="${c}"${c===cur?' selected':''}>${esc(c)}</option>`).join('');
  }

  function showError(msg) {
    document.getElementById('error-area').innerHTML = `<div class="error-box">${msg}</div>`;
  }

  function clearError() {
    document.getElementById('error-area').innerHTML = '';
  }

  async function fetchAll() {
    document.getElementById('grid').innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading inventory…</p></div>`;
    clearError();
    try {
      const [itemsRes, storesRes] = await Promise.all([
        fetch('/.netlify/functions/loyverse?path=items'),
        fetch('/.netlify/functions/loyverse?path=stores')
      ]);

      if (!itemsRes.ok) throw new Error(`API error ${itemsRes.status}. Check your LOYVERSE_TOKEN in Netlify.`);

      const itemsData = await itemsRes.json();
      const storesData = storesRes.ok ? await storesRes.json() : null;

      const storeId = storesData?.stores?.[0]?.id || '';
      if (storesData?.stores?.[0]?.name) {
        document.getElementById('store-name').textContent = storesData.stores[0].name;
      }

      const invRes = await fetch(`/.netlify/functions/loyverse?path=inventory${storeId ? '&store_id=' + storeId : ''}`);
      const invData = invRes.ok ? await invRes.json() : { inventory_levels: [] };

      inventoryMap = {};
      (invData.inventory_levels || []).forEach(l => {
        inventoryMap[l.variant_id] = l.in_stock ?? 0;
      });

      allItems = (itemsData.items || []).map(item => ({
        id: item.id,
        name: item.item_name,
        category: item.category_name || '',
        sku: item.variants?.[0]?.sku || '',
        variants: item.variants || []
      }));

      populateCats();
      updateStats();
      render();

      const now = new Date();
      document.getElementById('last-updated').textContent = `Last synced: ${now.toLocaleTimeString()}`;
    } catch (err) {
      showError('⚠ Could not load inventory. ' + err.message);
      document.getElementById('grid').innerHTML = `<div class="empty-state"><div class="big">⚠</div><p>Could not connect to Loyverse. See error above.</p></div>`;
    }
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetchAll();
  setInterval(fetchAll, 5 * 60 * 1000);
</script>
</body>
</html>
